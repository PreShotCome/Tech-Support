name: techsupport
description: Chat surface for the TechSupport agent. Long-term thinking partner.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
