<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Theo — Brain</title>
  <style>
    :root {
      --bg:       #0B0F14;
      --surface:  #141B22;
      --surfac2:  #1B232C;
      --accent:   #B2A4FF;
      --accent2:  #8276D6;
      --gold:     #E6B85C;
      --sage:     #A0B0A6;
      --danger:   #E57373;
      --success:  #7BC47F;
      --text:     #E8ECF0;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, sans-serif;
      overflow: hidden;
    }
    header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 14px 22px 10px;
      background: linear-gradient(180deg, var(--bg) 60%, transparent);
      z-index: 5; display: flex; align-items: baseline; gap: 18px;
    }
    h1 { margin: 0; font-size: 20px; letter-spacing: 1.2px; }
    h1 .sub { color: var(--sage); font-size: 12px; margin-left: 8px; }
    .stats {
      display: flex; flex-wrap: wrap; gap: 14px; margin-left: auto;
      color: var(--sage); font-size: 12px;
    }
    .stat b { color: var(--accent); font-weight: 600; margin-right: 4px; }
    main { position: relative; height: 100%; }
    svg { width: 100vw; height: 100vh; display: block; }
    .link { stroke: #2A3340; stroke-opacity: 0.65; }
    .node circle {
      stroke: var(--bg); stroke-width: 1.4;
      cursor: pointer; transition: stroke 120ms, r 120ms;
    }
    .node:hover circle { stroke: var(--accent); }
    .node text {
      fill: var(--sage); font-size: 11px;
      pointer-events: none;
      text-shadow: 0 0 4px var(--bg), 0 0 4px var(--bg);
    }
    .node.center text { fill: var(--text); font-size: 14px; font-weight: 600; }
    .node.category text { fill: var(--text); font-size: 12px; font-weight: 600; }
    .node.selected circle { stroke: var(--gold); stroke-width: 2.5; }

    aside.panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(440px, 92vw);
      background: var(--surface);
      border-left: 1px solid var(--surfac2);
      padding: 56px 22px 22px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 220ms ease;
      z-index: 10;
      box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    }
    aside.panel.open { transform: translateX(0); }
    aside.panel .close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: var(--sage);
      font-size: 22px; cursor: pointer; line-height: 1;
    }
    aside.panel h2 { margin: 0 0 4px; color: var(--text); font-size: 18px; }
    aside.panel .meta { color: var(--sage); font-size: 11px; margin-bottom: 16px; }
    aside.panel pre {
      background: var(--bg); color: var(--text);
      padding: 12px 14px; border-radius: 8px;
      font-size: 12px; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
      max-height: none;
    }
    aside.panel .body { font-size: 13.5px; line-height: 1.55; }
    aside.panel .body code {
      background: var(--surfac2); padding: 1px 5px; border-radius: 3px;
      font-size: 12.5px;
    }
    footer.legend {
      position: fixed; bottom: 12px; left: 18px;
      color: var(--sage); font-size: 11px; z-index: 5;
    }
    .legend .swatch {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }
    .empty {
      position: absolute; inset: 0; display: grid; place-items: center;
      color: var(--sage); text-align: center; padding: 32px;
    }
    .empty code { background: var(--surfac2); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>THEO <span class="sub" id="version"></span></h1>
    <div class="stats" id="stats"></div>
  </header>

  <main>
    <svg id="graph"></svg>
    <div class="empty" id="empty" style="display:none">
      No <code>brain.json</code> found. From the repo:
      <br/><br/>
      <code>python -m scripts.dump_brain</code>
      <br/><br/>
      Then <code>flutter build web &amp;&amp; firebase deploy</code>.
    </div>
  </main>

  <aside class="panel" id="panel" aria-hidden="true">
    <button class="close" id="close" aria-label="Close">×</button>
    <h2 id="panel-title"></h2>
    <div class="meta" id="panel-meta"></div>
    <div class="body" id="panel-body"></div>
  </aside>

  <footer class="legend" id="legend"></footer>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script>
    // --- color per category --------------------------------------------
    const CATEGORY_COLORS = {
      "core":         "#E6B85C",   // gold — load-bearing
      "voice":        "#B2A4FF",   // lavender — the voice
      "principles":   "#8276D6",
      "skills":       "#7BC47F",
      "research":     "#7BC47F",
      "memory":       "#A0B0A6",
      "threads":      "#E57373",
      "toolgroup:trading":       "#E6B85C",
      "toolgroup:memory":        "#A0B0A6",
      "toolgroup:system":        "#A0B0A6",
      "toolgroup:safety":        "#E57373",
      "toolgroup:identity":      "#B2A4FF",
      "toolgroup:web":           "#7BC47F",
      "toolgroup:introspection": "#B2A4FF",
      "toolgroup:osint":         "#7BC47F",
      "toolgroup:finance":       "#E6B85C",
      "toolgroup:server_metrics":"#A0B0A6",
      "toolgroup:security":      "#E57373",
      "toolgroup:browser":       "#7BC47F",
      "toolgroup:skills":        "#E6B85C",
      "toolgroup:diagrams":      "#B2A4FF",
      "toolgroup:file_sync":     "#7BC47F",
      "toolgroup:chess":         "#E6B85C",
      "toolgroup:file_transfer": "#7BC47F",
      "toolgroup:image_gen":     "#B2A4FF",
    };
    const DEFAULT_COLOR = "#B2A4FF";
    const colorOf = (id) => CATEGORY_COLORS[id] || DEFAULT_COLOR;

    // --- load and render -----------------------------------------------
    fetch("brain.json", {cache: "no-cache"})
      .then(r => { if (!r.ok) throw new Error("brain.json missing"); return r.json(); })
      .then(render)
      .catch(() => { document.getElementById("empty").style.display = "grid"; });

    function render(data) {
      // header stats
      document.getElementById("version").textContent =
        `v${data.identity_version} · ${data.generated_at.replace("T"," ").slice(0,16)} UTC`;
      const stats = data.stats || {};
      const statHtml = Object.entries(stats)
        .map(([k,v]) => `<div class="stat"><b>${v}</b>${k.replace(/_/g," ")}</div>`)
        .join("");
      document.getElementById("stats").innerHTML = statHtml;

      // build graph nodes + links
      const nodes = [{id: "theo", group: "center", label: "THEO", kind: "center"}];
      const links = [];
      for (const cat of data.categories) {
        nodes.push({
          id: cat.id, group: cat.id, label: cat.label,
          kind: "category",
        });
        links.push({source: "theo", target: cat.id});
        for (const n of (cat.nodes || [])) {
          nodes.push({
            ...n, group: cat.id, kind: "leaf",
            categoryLabel: cat.label,
          });
          links.push({source: cat.id, target: n.id});
        }
      }

      // legend
      const cats = data.categories;
      document.getElementById("legend").innerHTML = cats.map(c =>
        `<span style="margin-right:14px"><span class="swatch" style="background:${colorOf(c.id)}"></span>${c.label}</span>`
      ).join("");

      // d3 force layout
      const svg = d3.select("#graph");
      const W = window.innerWidth, H = window.innerHeight;

      const g = svg.append("g");
      svg.call(d3.zoom().scaleExtent([0.3, 3]).on("zoom",
        (e) => g.attr("transform", e.transform)));

      const sim = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d=>d.id)
          .distance(d => d.source.kind === "center" ? 180 : 60).strength(0.6))
        .force("charge", d3.forceManyBody().strength(-160))
        .force("center", d3.forceCenter(W/2, H/2))
        .force("collide", d3.forceCollide().radius(d =>
          d.kind === "center" ? 40 : d.kind === "category" ? 22 : 12));

      const link = g.append("g").attr("class","links").selectAll("line")
        .data(links).join("line").attr("class","link");

      const node = g.append("g").attr("class","nodes").selectAll("g.node")
        .data(nodes).join("g").attr("class", d => `node ${d.kind}`)
        .call(d3.drag()
          .on("start",(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
          .on("drag",(e,d)=>{ d.fx=e.x; d.fy=e.y; })
          .on("end",(e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

      node.append("circle")
        .attr("r", d => d.kind === "center" ? 22 : d.kind === "category" ? 11 : 6)
        .attr("fill", d => d.kind === "center" ? "#E8ECF0" : colorOf(d.group));

      node.append("text")
        .attr("x", d => d.kind === "center" ? 0 : (d.kind === "category" ? 14 : 9))
        .attr("y", d => d.kind === "center" ? -28 : 4)
        .attr("text-anchor", d => d.kind === "center" ? "middle" : "start")
        .text(d => d.label);

      node.on("click", (_e, d) => openPanel(d));

      sim.on("tick", () => {
        link
          .attr("x1", d=>d.source.x).attr("y1", d=>d.source.y)
          .attr("x2", d=>d.target.x).attr("y2", d=>d.target.y);
        node.attr("transform", d => `translate(${d.x},${d.y})`);
      });

      // --- panel ------------------------------------------------------
      const panel = document.getElementById("panel");
      const title = document.getElementById("panel-title");
      const meta  = document.getElementById("panel-meta");
      const body  = document.getElementById("panel-body");
      document.getElementById("close").addEventListener("click", closePanel);

      function closePanel() {
        panel.classList.remove("open");
        d3.selectAll("g.node").classed("selected", false);
      }
      function openPanel(d) {
        d3.selectAll("g.node").classed("selected", n => n.id === d.id);
        title.textContent = d.label;
        const bits = [];
        if (d.kind === "center") bits.push("The whole system");
        else if (d.kind === "category") bits.push("Category");
        else if (d.categoryLabel) bits.push(d.categoryLabel);
        if (d.path) bits.push(d.path);
        if (d.open !== undefined) bits.push(d.open ? "OPEN" : "closed");
        meta.textContent = bits.join(" · ");

        let html = "";
        if (d.kind === "center") {
          html = `<p>Theo. Identity, voice, memory, tools — click any node to see what's inside.</p>`;
        } else if (d.kind === "category") {
          // show child names
          const children = nodes.filter(n => n.group === d.id && n.kind === "leaf");
          html = `<p>${children.length} item${children.length===1?"":"s"} in this category.</p>`;
          html += "<ul>" + children.map(c=>`<li>${escapeHtml(c.label)}</li>`).join("") + "</ul>";
        } else {
          if (d.body) html += `<pre>${escapeHtml(d.body)}</pre>`;
          if (d.schema) html += `<div class="meta" style="margin-top:14px">Schema:</div>
                                 <pre>${escapeHtml(JSON.stringify(d.schema, null, 2))}</pre>`;
        }
        body.innerHTML = html;
        panel.classList.add("open");
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
        }[c]));
      }

      window.addEventListener("resize", () => {
        sim.force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2));
        sim.alpha(0.3).restart();
      });
    }
  </script>
</body>
</html>
