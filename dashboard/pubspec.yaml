name: dashboard
description: PreShotCome Dashboard — unified mobile app for all apps.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase (unified versions across all modules)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # Networking
  http: ^1.2.2

  # Auth / Google
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3
  path: ^1.9.0

  # Plutus
  plaid_flutter: ^5.1.1
  device_calendar: ^4.3.0

  # Charts / UI
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  webview_flutter: ^4.10.0

  # Metis — always-on capture
  flutter_local_notifications: ^17.2.3
  flutter_foreground_task: ^6.5.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # Trading-Bot — provider for its route subtree
  provider: ^6.1.2

  # Hestia — image picking
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/plutus/
    - assets/proteus/
    - assets/metis/
    - assets/theo/
    - assets/hestia/
